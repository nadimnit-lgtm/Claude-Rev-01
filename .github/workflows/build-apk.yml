name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check required project files
        run: |
          test -f settings.gradle
          test -f build.gradle
          test -f gradlew
          test -f app/build.gradle
          test -f app/src/main/AndroidManifest.xml
          test -d app/src/main/assets
          test -d app/src/main/assets/content

      - name: Check for duplicate Arabic content and run full validation
        run: python3 tools/validate.py

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AzkarTvDisplay-debug-apk
          path: app/build/outputs/apk/debug/*.apk
